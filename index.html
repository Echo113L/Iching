<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>观象 - 六爻卜卦</title>
<style>
  /* ========== 全局重置与基础 ========== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "KaiTi", "STKaiti", "楷体", "Microsoft YaHei", serif;
    background: #F5E6C8;
    color: #2C1810;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  /* ========== 主容器 ========== */
  .container {
    max-width: 520px;
    width: 100%;
    background: #FFF8E7;
    border: 3px solid #C8A42E;
    border-radius: 12px;
    padding: 24px 20px 30px;
    box-shadow: 0 4px 20px rgba(160,120,50,0.15);
    position: relative;
    align-self: flex-start;
  }
  /* 中国风装饰角 */
  .container::before, .container::after {
    content: "☰";
    position: absolute;
    font-size: 18px;
    color: #C8A42E;
    opacity: 0.3;
  }
  .container::before { top: 6px; left: 10px; }
  .container::after { bottom: 6px; right: 10px; transform: rotate(180deg); }

  /* ========== 标题 ========== */
  .header {
    text-align: center;
    border-bottom: 2px solid #C8A42E;
    padding-bottom: 12px;
    margin-bottom: 20px;
    position: relative;
  }
  .header h1 {
    font-size: 28px;
    color: #A6861E;
    letter-spacing: 8px;
    font-weight: normal;
  }
  .header .subtitle {
    font-size: 13px;
    color: #8B7355;
    margin-top: 4px;
    letter-spacing: 2px;
  }

  /* ========== 摇卦区 ========== */
  .toss-area {
    text-align: center;
    margin: 16px 0 20px;
  }
  .step-info {
    font-size: 14px;
    color: #8B7355;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .step-info .current { color: #A6861E; font-weight: bold; font-size: 18px; }

  /* 铜钱 - 仿真方孔圆钱 */
  .coins {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin: 10px 0 16px;
    min-height: 72px;
  }
  .coin {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    position: relative;
    background: radial-gradient(circle at 35% 35%, #E8C44A, #C8A42E 50%, #8B6914);
    border: 3px solid #7A5E10;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2), inset 0 -2px 5px rgba(0,0,0,0.15);
    transition: all 0.3s;
    user-select: none;
    flex-shrink: 0;
  }
  /* 方孔 */
  .coin::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    background: #FFF8E7;
    border: 2px solid #7A5E10;
    z-index: 2;
  }
  /* 初始状态 - 中心小圆点 */
  .coin.init::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 22px; height: 22px;
    border: 1.5px dotted #7A5E10;
    border-radius: 50%;
    opacity: 0.35;
    background: transparent;
  }
  /* 正面（字面/阴）- 内圈纹饰 */
  .coin-front::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 30px; height: 30px;
    border: 1.5px solid #7A5E10;
    border-radius: 50%;
    opacity: 0.45;
    background: transparent;
  }
  /* 背面（背/阳）- 月牙纹 */
  .coin-back::after {
    content: '';
    position: absolute;
    top: 10px; right: 12px;
    width: 12px; height: 7px;
    border: 2px solid #7A5E10;
    border-radius: 0 0 50% 50%;
    border-top: none;
    opacity: 0.4;
    background: transparent;
  }
  .coin.flipping { animation: coinFlip 0.6s ease-in-out; }
  @keyframes coinFlip {
    0% { transform: rotateY(0deg) scale(1); }
    25% { transform: rotateY(90deg) scale(0.95); }
    50% { transform: rotateY(180deg) scale(1); }
    75% { transform: rotateY(270deg) scale(0.95); }
    100% { transform: rotateY(360deg) scale(1); }
  }

  /* 摇卦按钮 */
  .toss-btn {
    display: inline-block;
    background: #C8A42E;
    color: #FFF8E7;
    border: none;
    padding: 12px 40px;
    font-size: 18px;
    font-family: inherit;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 4px;
  }
  .toss-btn:hover { background: #B89420; }
  .toss-btn:active { transform: scale(0.97); }
  .toss-btn:disabled {
    background: #C0B090;
    cursor: not-allowed;
    transform: none;
  }

  /* 结果提示 */
  .line-result {
    margin-top: 10px;
    font-size: 16px;
    min-height: 26px;
    color: #5C3D1E;
    letter-spacing: 1px;
  }
  .line-result .yao-label { font-weight: bold; color: #A6861E; }
  .line-result .changing-badge {
    display: inline-block;
    background: #C8A42E;
    color: #FFF8E7;
    font-size: 11px;
    padding: 1px 8px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ========== 卦象展示区 ========== */
  .hexagram-area {
    margin: 20px 0;
    padding: 16px;
    background: #FDF6E3;
    border: 1px solid #E8D5B0;
    border-radius: 8px;
    min-height: 200px;
  }

  /* 卦爻线绘制 */
  .hexagram-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 8px 0;
  }
  .hexagram-title {
    font-size: 22px;
    color: #A6861E;
    margin-bottom: 6px;
    letter-spacing: 3px;
  }
  .yao-line {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 180px;
    height: 26px;
    position: relative;
  }
  .yao-line .line-shape {
    display: block;
    height: 6px;
    border-radius: 3px;
    background: #1A1A1A;
    position: relative;
    transition: all 0.3s;
  }
  .yao-line .line-shape.yang {
    width: 140px;
  }
  .yao-line .line-shape.yin {
    width: 140px;
    height: 6px;
    background: transparent;
    background-image: linear-gradient(
      to right,
      #1A1A1A 0%, #1A1A1A 42%,
      transparent 42%, transparent 58%,
      #1A1A1A 58%, #1A1A1A 100%
    );
    border-radius: 3px;
  }
  .yao-line .yao-label-small {
    position: absolute;
    right: -30px;
    font-size: 11px;
    color: #A6861E;
    width: 30px;
  }
  .yao-line.changing .line-shape.yang::after {
    content: "●";
    position: absolute;
    right: -18px;
    top: -6px;
    font-size: 12px;
    color: #C8A42E;
  }
  .yao-line.changing .line-shape.yin::after {
    content: "●";
    position: absolute;
    right: -18px;
    top: -8px;
    font-size: 12px;
    color: #C8A42E;
  }

  /* ========== 解读区域 ========== */
  .reading-area { margin-top: 16px; }
  .reading-card {
    background: #FFF8E7;
    border: 1px solid #E8D5B0;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .reading-card .card-title {
    font-size: 16px;
    color: #A6861E;
    border-bottom: 1px solid #E8D5B0;
    padding-bottom: 4px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .reading-card .card-body {
    font-size: 14px;
    line-height: 1.8;
    color: #3C2A1A;
  }
  .reading-card .card-body .label { color: #A6861E; font-weight: bold; }
  .reading-card .yao-text {
    padding: 3px 0 3px 12px;
    border-left: 2px solid #C8A42E;
    margin: 4px 0;
    font-size: 13px;
  }
  .changing-note {
    background: #FDF6E3;
    border: 1px solid #C8A42E;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    color: #5C3D1E;
    margin: 8px 0;
    text-align: center;
  }

  /* ========== 白话解读 ========== */
  .baihua-text {
    font-size: 14px;
    line-height: 1.9;
    color: #3C2A1A;
  }
  .baihua-text p { margin-bottom: 8px; }
  .classical-quote {
    background: #FDF6E3;
    border-left: 3px solid #C8A42E;
    padding: 6px 12px;
    margin: 8px 0;
    font-size: 13px;
    color: #5C3D1E;
    font-style: italic;
  }

  /* ========== 典故案例 ========== */
  .story-block { margin-bottom: 10px; }
  .story-block .story-title {
    font-size: 14px;
    font-weight: bold;
    color: #5C3D1E;
    margin-bottom: 4px;
  }
  .story-block .story-title::before { content: "▸ "; color: #C8A42E; }
  .story-text {
    font-size: 13px;
    line-height: 1.8;
    color: #3C2A1A;
    padding-left: 12px;
    border-left: 2px solid #E8D5B0;
  }
  .story-source {
    font-size: 12px;
    color: #8B7355;
    margin-top: 4px;
    text-align: right;
  }

  /* ========== 防灾避祸 ========== */
  .disaster-warning {
    background: #FFF5F0;
    border: 1px solid #E8A070;
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 10px;
  }
  .disaster-warning .warn-icon { color: #C0392B; font-weight: bold; }
  .disaster-warning .warn-text {
    font-size: 13px;
    line-height: 1.7;
    color: #5C3020;
  }
  .avoidance-box {
    background: #F0FFF0;
    border: 1px solid #70B870;
    border-radius: 6px;
    padding: 10px 14px;
  }
  .avoidance-box .avoid-icon { color: #27AE60; font-weight: bold; }
  .avoidance-box .avoid-text {
    font-size: 13px;
    line-height: 1.7;
    color: #2C4A2C;
  }

  /* ========== 操作按钮 ========== */
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .actions button {
    background: transparent;
    border: 1px solid #C8A42E;
    color: #A6861E;
    padding: 8px 24px;
    font-size: 14px;
    font-family: inherit;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 2px;
  }
  .actions button:hover {
    background: #C8A42E;
    color: #FFF8E7;
  }
  .actions button.primary {
    background: #C8A42E;
    color: #FFF8E7;
  }
  .actions button.primary:hover { background: #B89420; }

  /* ========== 历史记录 ========== */
  .history-area { margin-top: 20px; }
  .history-toggle {
    background: none;
    border: none;
    color: #8B7355;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 1px;
    padding: 4px 8px;
    border-bottom: 1px dashed #C8A42E;
  }
  .history-toggle:hover { color: #A6861E; }
  .history-list {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    margin-top: 8px;
  }
  .history-list.open { max-height: 500px; }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 8px;
    border-bottom: 1px solid #F0E0C0;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .history-item:hover { background: #FDF6E3; }
  .history-item .h-name { color: #5C3D1E; }
  .history-item .h-time { color: #8B7355; font-size: 12px; }
  .history-empty {
    text-align: center;
    color: #8B7355;
    font-size: 13px;
    padding: 12px 0;
  }
  .clear-history {
    float: right;
    background: none;
    border: none;
    color: #B08060;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    padding: 2px 6px;
  }
  .clear-history:hover { color: #A04020; }

  /* ========== 响应式 ========== */
  @media (max-width: 480px) {
    .container { padding: 16px 12px; }
    .header h1 { font-size: 24px; letter-spacing: 4px; }
    .coin { width: 50px; height: 50px; font-size: 16px; }
    .coins { gap: 10px; }
    .yao-line { width: 150px; }
    .yao-line .line-shape.yang,
    .yao-line .line-shape.yin { width: 110px; }
    .yao-line .yao-label-small { right: -28px; font-size: 10px; width: 28px; }
    .toss-btn { padding: 10px 28px; font-size: 16px; }
  }

  /* ========== 隐藏辅助 ========== */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- 标题 -->
  <div class="header">
    <h1>观 象</h1>
    <div class="subtitle">— 六 爻 起 卦 —</div>
  </div>

  <!-- 摇卦区 -->
  <div class="toss-area" id="tossArea">
    <div class="step-info">
      第 <span class="current" id="stepNum">一</span> 爻 &nbsp;|&nbsp;
      共 <span id="totalSteps">六</span> 爻
    </div>
    <div class="coins" id="coinsContainer">
      <div class="coin init" id="coin1"></div>
      <div class="coin init" id="coin2"></div>
      <div class="coin init" id="coin3"></div>
    </div>
    <button class="toss-btn" id="tossBtn">摇 卦</button>
    <div class="line-result" id="lineResult"></div>
  </div>

  <!-- 卦象展示 -->
  <div class="hexagram-area" id="hexagramArea">
    <div class="hexagram-display" id="hexagramDisplay">
      <div class="hexagram-title" id="hexagramTitle">点击摇卦开始</div>
      <div id="hexagramLines"></div>
    </div>
  </div>

  <!-- 解读区域 -->
  <div class="reading-area hidden" id="readingArea">
    <div class="reading-card" id="judgmentCard">
      <div class="card-title">本 卦</div>
      <div class="card-body" id="judgmentBody"></div>
    </div>
    <div id="changingLines"></div>
    <div id="relatingHexagram"></div>
    <!-- 白话解读 -->
    <div class="reading-card hidden" id="baihuaCard">
      <div class="card-title">📖 白 话 解 读</div>
      <div class="card-body" id="baihuaBody"></div>
    </div>
    <!-- 典故案例 -->
    <div class="reading-card hidden" id="storyCard">
      <div class="card-title">📜 典 故 案 例</div>
      <div class="card-body" id="storyBody"></div>
    </div>
    <!-- 防灾避祸 -->
    <div class="reading-card hidden" id="disasterCard">
      <div class="card-title">⚠️ 防 灾 避 祸</div>
      <div class="card-body" id="disasterBody"></div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="actions" id="actionsArea">
    <button class="primary" id="restartBtn" onclick="restart()">重新占卜</button>
    <button id="historyBtn" onclick="toggleHistory()">卜卦记录</button>
  </div>

  <!-- 历史记录 -->
  <div class="history-area">
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">暂无记录</div>
      <div id="historyItems"></div>
      <button class="clear-history hidden" id="clearHistoryBtn" onclick="clearHistory()">清空记录</button>
    </div>
  </div>
</div>

<script>
// ==========================================================
// 1. 六十四卦完整数据
// ==========================================================
const HEXAGRAMS = [
  { name:"乾", upper:"乾", lower:"乾", unicode:"䷀",
    judgment:"乾，元，亨，利，贞。",
    image:"天行健，君子以自强不息。",
    meaning:"刚健不息，自强不息",
    lines:[
      "初九：潜龙勿用。",
      "九二：见龙在田，利见大人。",
      "九三：君子终日乾乾，夕惕若厉，无咎。",
      "九四：或跃在渊，无咎。",
      "九五：飞龙在天，利见大人。",
      "上九：亢龙有悔。"
    ]},
  { name:"坤", upper:"坤", lower:"坤", unicode:"䷁",
    judgment:"坤，元亨，利牝马之贞。君子有攸往，先迷后得主。西南得朋，东北丧朋。安贞吉。",
    image:"地势坤，君子以厚德载物。",
    meaning:"柔顺宽厚，厚德载物",
    lines:[
      "初六：履霜，坚冰至。",
      "六二：直方大，不习无不利。",
      "六三：含章可贞。或从王事，无成有终。",
      "六四：括囊，无咎无誉。",
      "六五：黄裳元吉。",
      "上六：龙战于野，其血玄黄。"
    ]},
  { name:"屯", upper:"坎", lower:"震", unicode:"䷂",
    judgment:"屯，元亨利贞。勿用有攸往，利建侯。",
    image:"云雷屯，君子以经纶。",
    meaning:"万事开头难，初生艰难",
    lines:[
      "初九：磐桓，利居贞，利建侯。",
      "六二：屯如邅如，乘马班如。匪寇婚媾，女子贞不字，十年乃字。",
      "六三：即鹿无虞，惟入于林中。君子几不如舍，往吝。",
      "六四：乘马班如，求婚媾往吉，无不利。",
      "九五：屯其膏，小贞吉，大贞凶。",
      "上六：乘马班如，泣血涟如。"
    ]},
  { name:"蒙", upper:"艮", lower:"坎", unicode:"䷃",
    judgment:"蒙，亨。匪我求童蒙，童蒙求我。初筮告，再三渎，渎则不告。利贞。",
    image:"山下出泉，蒙。君子以果行育德。",
    meaning:"蒙昧启蒙，需要教育引导",
    lines:[
      "初六：发蒙，利用刑人，用说桎梏，以往吝。",
      "九二：包蒙吉，纳妇吉，子克家。",
      "六三：勿用取女，见金夫，不有躬，无攸利。",
      "六四：困蒙，吝。",
      "六五：童蒙，吉。",
      "上九：击蒙，不利为寇，利御寇。"
    ]},
  { name:"需", upper:"坎", lower:"乾", unicode:"䷄",
    judgment:"需，有孚，光亨贞吉。利涉大川。",
    image:"云上于天，需。君子以饮食宴乐。",
    meaning:"等待时机，需待而动",
    lines:[
      "初九：需于郊，利用恒，无咎。",
      "九二：需于沙，小有言，终吉。",
      "九三：需于泥，致寇至。",
      "六四：需于血，出自穴。",
      "九五：需于酒食，贞吉。",
      "上六：入于穴，有不速之客三人来，敬之终吉。"
    ]},
  { name:"讼", upper:"乾", lower:"坎", unicode:"䷅",
    judgment:"讼，有孚窒惕，中吉，终凶。利见大人，不利涉大川。",
    image:"天与水违行，讼。君子以作事谋始。",
    meaning:"争讼，宜和解不宜争斗",
    lines:[
      "初六：不永所事，小有言，终吉。",
      "九二：不克讼，归而逋其邑，人三百户，无眚。",
      "六三：食旧德，贞厉，终吉。或从王事，无成。",
      "九四：不克讼，复即命渝安，贞吉。",
      "九五：讼元吉。",
      "上九：或锡之鞶带，终朝三褫之。"
    ]},
  { name:"师", upper:"坤", lower:"坎", unicode:"䷆",
    judgment:"师，贞，丈人吉，无咎。",
    image:"地中有水，师。君子以容民畜众。",
    meaning:"兴师动众，需纪律严明",
    lines:[
      "初六：师出以律，否藏凶。",
      "九二：在师中吉，无咎，王三锡命。",
      "六三：师或舆尸，凶。",
      "六四：师左次，无咎。",
      "六五：田有禽，利执言，无咎。长子帅师，弟子舆尸，贞凶。",
      "上六：大君有命，开国承家，小人勿用。"
    ]},
  { name:"比", upper:"坎", lower:"坤", unicode:"䷇",
    judgment:"比，吉。原筮元永贞，无咎。不宁方来，后夫凶。",
    image:"地上有水，比。先王以建万国，亲诸侯。",
    meaning:"亲比和睦，团结互助",

      "睽卦上离（火）下兑（泽），代表「上火下泽」——火往上烧、水往下流，方向相反。睽就是乖离、分歧的意思。这个卦讲的是如何处理分歧和矛盾。",
      "卦辞说「睽，小事吉」——在分歧的时候，做小事吉利，大事不宜。意思是：有分歧时先从容易达成一致的小事做起，大事慢慢来。",
      "上九「睽孤见豕负涂，载鬼一车」——在分歧严重时，看对方像看到猪身上涂满了泥、车上装满了鬼——完全扭曲了对方形象。最终「匪寇婚媾，往遇雨则吉」——原来不是敌人，和好如初。"
    ],
    stories: [
      {
        title: "诸葛亮与周瑜——睽而能合",
        text: "赤壁之战前，诸葛亮和周瑜各为其主，互有猜忌。周瑜几次想除掉诸葛亮，诸葛亮也防着周瑜。但在大敌当前时，两人放下分歧、精诚合作，最终大败曹操。这正是睽卦「小事吉」——虽然分歧巨大，但在共同目标下求同存异，总能做出成绩。",
        source: "《三国志·吴书·周瑜传》"

    disaster: "上九「睽孤」——分歧发展到极端，孤立无援。看谁都是坏人（载鬼一车），完全失去客观判断能力。这是最危险的。",
    avoidance: "① 有分歧时要从「小事」入手，先易后难。②「求同存异」——睽卦的核心智慧。③ 不要因为分歧而完全否定对方（「见豕负涂」的扭曲心态要避免）。④ 宽宏大量，即使对恶人也要适度交往。"

  "蹇": {

  }
};

function getTrigramName(yao1, yao2, yao3) {
  const key = [yao1, yao2, yao3].map(y => y ? '1' : '0').join('');
  const map = {
    '111': '乾', '110': '兑', '101': '离', '100': '震',
    '011': '巽', '010': '坎', '001': '艮', '000': '坤'
  };
  return map[key];
}

// 根据上下卦查找六十四卦
function findHexagram(upperName, lowerName) {
  return HEXAGRAMS.find(h => h.upper === upperName && h.lower === lowerName);
}

// 爻位名称
const POSITION_NAMES = ['初', '二', '三', '四', '五', '上'];

// 获取爻位完整名称（如"初九"、"六二"）
function getYaoPositionName(index, isYang) {
  const yinYang = isYang ? '九' : '六';
  return POSITION_NAMES[index] + yinYang;
}

// ==========================================================
// 3. 应用状态
// ==========================================================
const state = {
  currentStep: 0,         // 0-5，当前摇到第几爻
  lines: [],              // [{value: true/false (阳/阴), changing: true/false (动/静)}]
  coinResults: [],        // 每次摇卦的3枚铜钱结果
  isComplete: false,
  isAnimating: false
};

// ==========================================================
// 4. DOM 引用
// ==========================================================
const $ = id => document.getElementById(id);
const tossBtn = $('tossBtn');
const stepNum = $('stepNum');
const lineResult = $('lineResult');
const hexagramLines = $('hexagramLines');
const hexagramTitle = $('hexagramTitle');
const readingArea = $('readingArea');
const judgmentBody = $('judgmentBody');
const changingLines = $('changingLines');
const relatingHexagram = $('relatingHexagram');
const historyList = $('historyList');
const historyItems = $('historyItems');
const historyEmpty = $('historyEmpty');
const clearHistoryBtn = $('clearHistoryBtn');

// ==========================================================
// 5. 核心逻辑
// ==========================================================

const NUM_STEPS = 6;
const STEP_NAMES = ['一', '二', '三', '四', '五', '六'];

function tossCoins() {
  if (state.isAnimating || state.isComplete) return;

  state.isAnimating = true;
  tossBtn.disabled = true;

  // 模拟三枚铜钱：true=背(阳)，false=字(阴)
  const coins = [
    Math.random() < 0.5,
    Math.random() < 0.5,
    Math.random() < 0.5
  ];
  state.coinResults.push(coins);

  // 统计背面数量
  const backCount = coins.filter(c => c).length;

  // 判定爻
  let value, changing, typeName;
  if (backCount === 3) {
    value = true;  // 老阳
    changing = true;
    typeName = '老阳（○）— 动爻';
  } else if (backCount === 0) {
    value = false; // 老阴
    changing = true;
    typeName = '老阴（×）— 动爻';
  } else if (backCount === 2) {
    value = true;  // 少阳
    changing = false;
    typeName = '少阳（—）— 静爻';
  } else {
    value = false; // 少阴
    changing = false;
    typeName = '少阴（- -）— 静爻';
  }

  state.lines.push({ value, changing });
  const posName = getYaoPositionName(state.currentStep, value);

  // 铜钱动画
  animateCoins(coins, () => {
    // 显示结果
    lineResult.innerHTML = `<span class="yao-label">${posName}</span>：${typeName}`;

    // 更新步骤
    state.currentStep++;
    if (state.currentStep >= NUM_STEPS) {
      state.isComplete = true;
      tossBtn.disabled = true;
      stepNum.textContent = STEP_NAMES[NUM_STEPS - 1];
      setTimeout(() => completeReading(), 300);
    } else {
      stepNum.textContent = STEP_NAMES[state.currentStep];
      tossBtn.disabled = false;
    }

    // 更新卦象显示
    renderHexagram();

    state.isAnimating = false;
  });
}

// 铜钱动画
function animateCoins(coins, callback) {
  const coinEls = [1, 2, 3].map(i => $('coin' + i));

  coinEls.forEach((el, i) => {
    el.className = 'coin flipping';
  });

  setTimeout(() => {
    coinEls.forEach((el, i) => {
      el.className = 'coin ' + (coins[i] ? 'coin-back' : 'coin-front');
    });
    callback();
  }, 600);
}

// 渲染卦象
function renderHexagram() {
  hexagramLines.innerHTML = '';
  const totalLines = state.lines.length;

  // 从上往下显示（先画上爻，再画初爻）
  for (let i = totalLines - 1; i >= 0; i--) {
    const line = state.lines[i];
    const div = document.createElement('div');
    div.className = 'yao-line' + (line.changing ? ' changing' : '');
    div.style.display = 'flex';

    const shape = document.createElement('span');
    shape.className = 'line-shape ' + (line.value ? 'yang' : 'yin');
    div.appendChild(shape);

    const label = document.createElement('span');
    label.className = 'yao-label-small';
    label.textContent = getYaoPositionName(i, line.value);
    div.appendChild(label);

    hexagramLines.appendChild(div);
  }

  if (totalLines > 0) {
    hexagramTitle.textContent = state.isComplete ? '起卦完成' : '正在起卦……';
  }
}

// 完成占卜，显示解读
function completeReading() {
  // 提取上下卦
  const lowerTrigram = [state.lines[0].value, state.lines[1].value, state.lines[2].value];
  const upperTrigram = [state.lines[3].value, state.lines[4].value, state.lines[5].value];

  const lowerName = getTrigramName(...lowerTrigram);
  const upperName = getTrigramName(...upperTrigram);

  const hexagram = findHexagram(upperName, lowerName);
  if (!hexagram) {
    hexagramTitle.textContent = '未找到对应卦象';
    return;
  }

  hexagramTitle.textContent = hexagram.unicode + ' ' + hexagram.name + ' 卦';

  // 显示解读
  readingArea.classList.remove('hidden');

  let judgmentHtml = '';
  judgmentHtml += `<div><span class="label">卦名：</span>${hexagram.unicode} ${hexagram.name}（${hexagram.upper}上${hexagram.lower}下）</div>`;
  judgmentHtml += `<div style="margin-top:6px;"><span class="label">卦辞：</span>${hexagram.judgment}</div>`;
  judgmentHtml += `<div style="margin-top:6px;"><span class="label">象辞：</span>${hexagram.image}</div>`;
  judgmentHtml += `<div style="margin-top:6px;"><span class="label">含义：</span>${hexagram.meaning}</div>`;
  judgmentBody.innerHTML = judgmentHtml;

  // 分类解读
  const catNames = { shiyun:"时运", caiyun:"财运", jiazhai:"家宅", shenti:"身体", hunlian:"婚恋", xueye:"学业", shiye:"事业", chuxing:"出行", guansi:"官司", qiuzhi:"求职", touzi:"投资" };
  const catKeys = ["shiyun","caiyun","jiazhai","shenti","hunlian","xueye","shiye","chuxing","guansi","qiuzhi","touzi"];
  const categories = HEXAGRAM_CATEGORIES[hexagram.name];

  let catHtml = '<div class="reading-card"><div class="card-title">分类解读</div><div class="card-body">';
  catHtml += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">';
  catKeys.forEach(k => {
    catHtml += `<span class="cat-tab" data-cat="${k}" onclick="selectCategory(this,'${hexagram.name}')" style="display:inline-block;padding:3px 12px;border:1px solid #C8A42E;border-radius:4px;font-size:13px;cursor:pointer;color:#A6861E;background:#FFF8E7;transition:all 0.2s;">${catNames[k]}</span>`;
  });
  catHtml += '</div><div id="catContent" style="font-size:14px;line-height:1.8;color:#3C2A1A;min-height:30px;">点击上方标签查看分类解读</div>';
  catHtml += '</div></div>';

  // 插入分类解读
  judgmentBody.innerHTML = judgmentHtml + catHtml;

  // 查找动爻，显示对应的爻辞
  const changingIndices = [];
  state.lines.forEach((line, i) => {
    if (line.changing) changingIndices.push(i);
  });

  let changingHtml = '';
  if (changingIndices.length > 0) {
    changingHtml += '<div class="reading-card"><div class="card-title">动 爻 提 示</div><div class="card-body">';
    changingIndices.forEach(idx => {
      const posName = getYaoPositionName(idx, state.lines[idx].value);
      // 从 hexagram 的 lines 中取出对应爻辞（去掉前缀）
      const lineText = hexagram.lines[idx];
      changingHtml += `<div class="yao-text"><b>${posName}</b>：${lineText.replace(/^[^：]*：/, '')}</div>`;
    });
    changingHtml += '<div style="margin-top:8px;font-size:12px;color:#8B7355;">※ 动爻表示事情有变化，可重点关注以上爻辞。</div>';
    changingHtml += '</div></div>';

    // 变卦
    const relatedLines = state.lines.map(l => ({
      value: l.changing ? !l.value : l.value
    }));
    const rLower = [relatedLines[0].value, relatedLines[1].value, relatedLines[2].value];
    const rUpper = [relatedLines[3].value, relatedLines[4].value, relatedLines[5].value];
    const rLowerName = getTrigramName(...rLower);
    const rUpperName = getTrigramName(...rUpper);
    const relatedHexagram = findHexagram(rUpperName, rLowerName);

    if (relatedHexagram) {
      changingHtml += '<div class="reading-card"><div class="card-title">变 卦</div><div class="card-body">';
      changingHtml += `<div><span class="label">${relatedHexagram.unicode} ${relatedHexagram.name}</span>（${relatedHexagram.upper}上${relatedHexagram.lower}下）</div>`;
      changingHtml += `<div style="margin-top:4px;">${relatedHexagram.judgment}</div>`;
      changingHtml += `<div style="margin-top:4px;font-size:12px;color:#8B7355;">※ 变卦代表事情发展的趋势。</div>`;
      changingHtml += '</div></div>';
    }
  } else {
    changingHtml += '<div class="changing-note">此卦无动爻，宜按本卦卦辞行事。</div>';
  }

  changingLines.innerHTML = changingHtml;
  relatingHexagram.innerHTML = '';

  // 计算变卦供历史使用
  const relatedLinesAll = state.lines.map(l => ({
    value: l.changing ? !l.value : l.value
  }));
  const rLowerAll = [relatedLinesAll[0].value, relatedLinesAll[1].value, relatedLinesAll[2].value];
  const rUpperAll = [relatedLinesAll[3].value, relatedLinesAll[4].value, relatedLinesAll[5].value];
  const rLowerNameAll = getTrigramName(...rLowerAll);
  const rUpperNameAll = getTrigramName(...rUpperAll);
  const relatedHexagramAll = findHexagram(rUpperNameAll, rLowerNameAll);

  // 显示白话解读、典故、防灾避祸
  const details = HEXAGRAM_DETAILS[hexagram.name];
  if (details) {
    // 白话解读
    const baihuaCard = $('baihuaCard');
    const baihuaBody = $('baihuaBody');
    if (details.baihua) {
      baihuaCard.classList.remove('hidden');
      let baihuaHtml = '<div class="baihua-text">';
      (Array.isArray(details.baihua) ? details.baihua : [details.baihua]).forEach(p => {
        // 支持经典原文引用（带引号或括号的）
        const formatted = p.replace(/「([^」]*)」/g, '<div class="classical-quote">$1</div>');
        baihuaHtml += '<p>' + formatted + '</p>';
      });
      baihuaHtml += '</div>';
      baihuaBody.innerHTML = baihuaHtml;
    }

    // 典故案例
    const storyCard = $('storyCard');
    const storyBody = $('storyBody');
    if (details.stories && details.stories.length > 0) {
      storyCard.classList.remove('hidden');
      let storyHtml = '';
      details.stories.forEach(s => {
        storyHtml += '<div class="story-block">';
        storyHtml += `<div class="story-title">${s.title}</div>`;
        storyHtml += `<div class="story-text">${s.text}</div>`;
        if (s.source) storyHtml += `<div class="story-source">— 摘自${s.source}</div>`;
        storyHtml += '</div>';
      });
      storyBody.innerHTML = storyHtml;
    }

    // 防灾避祸
    const disasterCard = $('disasterCard');
    const disasterBody = $('disasterBody');
    if (details.disaster || details.avoidance) {
      disasterCard.classList.remove('hidden');
      let disasterHtml = '';
      if (details.disaster) {
        disasterHtml += '<div class="disaster-warning">';
        disasterHtml += `<div class="warn-text"><span class="warn-icon">⚠️ 灾祸警示：</span>${details.disaster}</div>`;
        disasterHtml += '</div>';
      }
      if (details.avoidance) {
        disasterHtml += '<div class="avoidance-box">';
        disasterHtml += `<div class="avoid-text"><span class="avoid-icon">✅ 避祸方法：</span>${details.avoidance}</div>`;
        disasterHtml += '</div>';
      }
      disasterBody.innerHTML = disasterHtml;
    }
  }

  // 保存到历史（含变卦信息）
  saveHistory(hexagram, relatedHexagramAll);
}

// 选择分类解读标签
function selectCategory(el, hexName) {
  const cat = el.dataset.cat;
  const categories = HEXAGRAM_CATEGORIES[hexName];
  if (!categories) return;
  const catNames = { shiyun:"时运", caiyun:"财运", jiazhai:"家宅", shenti:"身体", hunlian:"婚恋", xueye:"学业", shiye:"事业", chuxing:"出行", guansi:"官司", qiuzhi:"求职", touzi:"投资" };
  const content = document.getElementById('catContent');
  if (!content) return;
  content.innerHTML = `<b style="color:#A6861E;">【${catNames[cat]}】</b> ${categories[cat]}`;
  // 高亮当前标签
  document.querySelectorAll('.cat-tab').forEach(t => {
    t.style.background = '#FFF8E7';
    t.style.color = '#A6861E';
  });
  el.style.background = '#C8A42E';
  el.style.color = '#FFF8E7';
}

// ==========================================================
// 6. 历史记录
// ==========================================================
const HISTORY_KEY = 'iching_history';

function saveHistory(hexagram, relatedHexagram) {
  const records = getHistory();
  // 查找动爻位置
  const changingIndices = [];
  state.lines.forEach((l, i) => { if (l.changing) changingIndices.push(i); });
  const record = {
    id: Date.now(),
    time: new Date().toLocaleString('zh-CN'),
    hexagramName: hexagram.name,
    hexagramUnicode: hexagram.unicode,
    judgment: hexagram.judgment,
    meaning: hexagram.meaning,
    lines: state.lines.map(l => ({ value: l.value, changing: l.changing })),
    changingCount: changingIndices.length,
    changingIndices: changingIndices,
    relatedHexagram: relatedHexagram ? {
      name: relatedHexagram.name,
      unicode: relatedHexagram.unicode,
      judgment: relatedHexagram.judgment,
      upper: relatedHexagram.upper,
      lower: relatedHexagram.lower
    } : null
  };
  records.unshift(record);
  // 最多保存30条
  if (records.length > 30) records.length = 30;
  localStorage.setItem(HISTORY_KEY, JSON.stringify(records));
  renderHistory();
}

function getHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  } catch { return []; }
}

function renderHistory() {
  const records = getHistory();
  if (records.length === 0) {
    historyEmpty.classList.remove('hidden');
    historyItems.innerHTML = '';
    clearHistoryBtn.classList.add('hidden');
    return;
  }
  historyEmpty.classList.add('hidden');
  clearHistoryBtn.classList.remove('hidden');

  historyItems.innerHTML = records.map(r => `
    <div class="history-item" onclick="showHistoryDetail(${r.id})">
      <span class="h-name">${r.hexagramUnicode} ${r.hexagramName}卦</span>
      <span class="h-time">${r.time}</span>
    </div>
  `).join('');
}

function toggleHistory() {
  historyList.classList.toggle('open');
  renderHistory();
}

function showHistoryDetail(id) {
  const records = getHistory();
  const r = records.find(rec => rec.id === id);
  if (!r) return;
  // 查找 hexagram 数据
  const hex = HEXAGRAMS.find(h => h.name === r.hexagramName);
  if (!hex) return;

  // 填入展示区
  hexagramTitle.textContent = (r.hexagramUnicode || '') + ' ' + r.hexagramName + ' 卦';

  // 重建爻线（从上往下：上爻在上，初爻在下）
  hexagramLines.innerHTML = '';
  if (r.lines) {
    for (let i = r.lines.length - 1; i >= 0; i--) {
      const line = r.lines[i];
      const div = document.createElement('div');
      div.className = 'yao-line' + (line.changing ? ' changing' : '');
      const shape = document.createElement('span');
      shape.className = 'line-shape ' + (line.value ? 'yang' : 'yin');
      div.appendChild(shape);
      const label = document.createElement('span');
      label.className = 'yao-label-small';
      label.textContent = getYaoPositionName(i, line.value);
      div.appendChild(label);
      hexagramLines.appendChild(div);
    }
  }

  // 显示解读
  readingArea.classList.remove('hidden');

  const catNames = { shiyun:"时运", caiyun:"财运", jiazhai:"家宅", shenti:"身体", hunlian:"婚恋", xueye:"学业", shiye:"事业", chuxing:"出行", guansi:"官司", qiuzhi:"求职", touzi:"投资" };
  const catKeys = ["shiyun","caiyun","jiazhai","shenti","hunlian","xueye","shiye","chuxing","guansi","qiuzhi","touzi"];
  const categories = HEXAGRAM_CATEGORIES[hex.name];

  let catHtml = '<div style="margin-top:12px;border-top:1px solid #E8D5B0;padding-top:10px;"><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">';
  catKeys.forEach(k => {
    catHtml += `<span class="cat-tab" data-cat="${k}" onclick="selectCategory(this,'${hex.name}')" style="display:inline-block;padding:3px 10px;border:1px solid #C8A42E;border-radius:4px;font-size:12px;cursor:pointer;color:#A6861E;background:#FFF8E7;">${catNames[k]}</span>`;
  });
  catHtml += '</div><div id="catContent" style="font-size:13px;line-height:1.8;color:#3C2A1A;min-height:24px;">点击标签查看分类解读</div></div>';

  judgmentBody.innerHTML = `
    <div><span class="label">卦名：</span>${r.hexagramUnicode || ''} ${r.hexagramName}</div>
    <div style="margin-top:6px;"><span class="label">卦辞：</span>${r.judgment || hex.judgment}</div>
    <div style="margin-top:6px;"><span class="label">含义：</span>${r.meaning || hex.meaning}</div>
  ` + catHtml;

  // 显示历史中的动爻信息
  let historyExtraHtml = '';
  if (r.changingCount && r.changingCount > 0 && r.changingIndices) {
    historyExtraHtml += '<div class="reading-card" style="margin-top:10px;"><div class="card-title">历 史 动 爻</div><div class="card-body">';
    historyExtraHtml += `<div style="font-size:13px;color:#5C3D1E;">此卦有 <b style="color:#A6861E;">${r.changingCount}</b> 个动爻，分别位于：</div>`;
    r.changingIndices.forEach(idx => {
      const posName = getYaoPositionName(idx, r.lines[idx].value);
      historyExtraHtml += `<div class="yao-text"><b>${posName}</b>${r.lines[idx].value ? '（阳爻变阴）' : '（阴爻变阳）'}</div>`;
    });
    historyExtraHtml += '</div></div>';
  }
  if (r.relatedHexagram) {
    historyExtraHtml += '<div class="reading-card"><div class="card-title">变 卦（历史）</div><div class="card-body">';
    historyExtraHtml += `<div><span class="label">${r.relatedHexagram.unicode || ''} ${r.relatedHexagram.name}</span>（${r.relatedHexagram.upper}上${r.relatedHexagram.lower}下）</div>`;
    historyExtraHtml += `<div style="margin-top:4px;font-size:13px;">${r.relatedHexagram.judgment}</div>`;
    historyExtraHtml += '</div></div>';
  }
  if (!historyExtraHtml) {
    historyExtraHtml = '<div class="changing-note" style="margin-top:10px;">此卦无动爻。</div>';
  }
  changingLines.innerHTML = historyExtraHtml;
  relatingHexagram.innerHTML = '';

  // 隐藏白话解读、典故、避祸区域（仅新占卜时显示）
  $('baihuaCard').classList.add('hidden');
  $('storyCard').classList.add('hidden');
  $('disasterCard').classList.add('hidden');

  historyList.classList.remove('open');
}

function clearHistory() {
  if (confirm('确定要清空所有卜卦记录吗？')) {
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
  }
}

// ==========================================================
// 7. 重新开始
// ==========================================================
function restart() {
  state.currentStep = 0;
  state.lines = [];
  state.coinResults = [];
  state.isComplete = false;
  state.isAnimating = false;

  tossBtn.disabled = false;
  stepNum.textContent = STEP_NAMES[0];
  lineResult.innerHTML = '';
  hexagramTitle.textContent = '点击摇卦开始';
  hexagramLines.innerHTML = '';
  readingArea.classList.add('hidden');
  $('baihuaCard').classList.add('hidden');
  $('storyCard').classList.add('hidden');
  $('disasterCard').classList.add('hidden');

  // 清空铜钱显示
  [1,2,3].forEach(i => {
    const el = $('coin' + i);
    el.className = 'coin init';
  });
}

// ==========================================================
// 8. 初始化
// ==========================================================
tossBtn.addEventListener('click', tossCoins);
renderHistory();
</script>
</body>
</html>
